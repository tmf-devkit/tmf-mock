name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check tmf_mock tests

      - name: Run tests
        run: pytest -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tmf-mock:ci .

      - name: Smoke test Docker image
        run: |
          docker run -d --name tmf-mock-ci -p 8000:8000 tmf-mock:ci
          sleep 8
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok'
          assert d['store']['resources'] > 0
          print('Docker smoke test passed:', d['store'])
          "
          docker stop tmf-mock-ci
